spring:
  application:
    name: carcare
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Skopje
  jackson:
    time-zone: Europe/Skopje
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        from: no-reply@carcare.local
        smtp:
          localhost: localhost
          auth: false
          starttls:
            enable: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    check-template-location: false
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
app:
  time-zone: Europe/Skopje
  mail:
    from: no-reply@carcare.local
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    access-minutes: 15
    refresh-days: 30
  seeder:
    enabled: true  # set to true (or pass --app.seeder.enabled=true) to populate test data
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    root: INFO
